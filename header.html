<!DOCTYPE html>
<html>
<head>

<title>DJ Yuvraj Social Icons</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">

</head>
<body>

<!-- Social Media Icons Section -->
<div class="col-md-4 social-icon text-center bleft">

    <span class="other" style="margin-left:15px;">

        <!-- Facebook -->
        <a target="_blank" href="https://facebook.com/djyuvrajjpr">
            <img src="https://www.allindiandjsclub.in/img/fblogo21072024.png"
                 alt="Facebook"
                 style="height:18px; margin:0 0 6px -10px;">
        </a>

        <!-- Instagram -->
        <a target="_blank" href="https://instagram.com/djyuvrajjaipur">
            <img src="https://www.allindiandjsclub.in/img/instalogo21072024.png"
                 alt="Instagram"
                 style="height:18px; margin:0 0 6px -10px;">
        </a>

        <!-- X / Twitter -->
        <a target="_blank" href="https://x.com/djyuvrajjaipur">
            <img src="https://www.allindiandjsclub.in/img/twitterlogo21072024.png"
                 alt="Twitter"
                 style="height:16px; margin:0 0 6px -10px;">
        </a>

        <!-- YouTube -->
        <a target="_blank" href="https://www.youtube.com/@DJYUVRAJ_">
            <img src="https://www.allindiandjsclub.in/img/youtubelogo21072024.png"
                 alt="YouTube"
                 style="height:20px; margin:0 0 6px -10px;">
        </a>

        <!-- HearThis -->
        <a target="_blank" href="https://hearthis.at/djyuvrajjaipur">
            <img src="https://www.allindiandjsclub.in/img/herethis21072024.png"
                 alt="HearThis"
                 style="height:18px; margin:0 0 6px -10px;">
        </a>

        <!-- Telegram -->
        <a target="_blank" href="https://t.me/djsyuvraj">
            <img src="https://www.allindiandjsclub.in/img/telegramlogo21072024.png"
                 alt="Telegram"
                 style="height:20px; margin:0 0 6px -10px;">
        </a>

        <!-- WhatsApp -->
        <a target="_blank" href="https://wa.djyuvraj.in/">
            <img src="https://www.allindiandjsclub.in/img/whatsapplogo21072024.png"
                 alt="WhatsApp"
                 style="height:18px; margin:0 0 6px -10px;">
        </a>

        <!-- Search Button -->
        <a href="#" id="openSearch" style="font-size:24px;">
            <i class="ion ion-ios-search-strong"></i>
        </a>

    </span>

    <!-- Search Box -->
    <div class="row search-wrapper social-icon hidden" id="searchBox">

        <div class="col-xs-10">
            <form class="di btn-block"
                  action="https://www.allindiandjsclub.in/search">

                <input type="text"
                       name="q"
                       class="search-nav ips"
                       placeholder="Search">
            </form>
        </div>

        <div class="col-xs-2">
            <a href="#" class="di closebt" id="closeSearch">
                <i class="ion ion-ios-close-empty"></i>
            </a>
        </div>

    </div>

</div>

<!-- CSS -->
<style>
.social-icon a img{
    transition:0.3s;
}

.social-icon a img:hover{
    transform:scale(1.15);
}

.search-wrapper{
    margin-top:10px;
}

.hidden{
    display:none;
}

.search-nav{
    width:100%;
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:5px;
}
</style>

<!-- JavaScript -->
<script>
document.getElementById("openSearch").addEventListener("click", function(e){
    e.preventDefault();
    document.getElementById("searchBox").classList.remove("hidden");
});

document.getElementById("closeSearch").addEventListener("click", function(e){
    e.preventDefault();
    document.getElementById("searchBox").classList.add("hidden");
});
</script>
</body>
</html>
